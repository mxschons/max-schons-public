name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for jekyll-last-modified-at + build_llms_txt.rb

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Lint ${VARNAME} tokens
        run: ruby script/lint_tokens.rb

      - name: Render TSVs
        run: ruby script/render_tsvs.rb

      - name: Build FAQ aggregate
        run: ruby script/build_faq_aggregate.rb

      - name: Build area indexes
        run: ruby script/build_area_indexes.rb

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Copy raw markdown into _site
        run: ruby script/copy_raw_markdown.rb

      - name: Build llms.txt and llms-full.txt
        run: ruby script/build_llms_txt.rb

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
